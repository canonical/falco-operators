project: falco-operators
path: /home/ubuntu/proj
kill-timeout: 60m
warn-timeout: 1m
backends:
  integration-test:
    type: integration-test
    systems:
    - ubuntu-24.04:
        runner: [self-hosted, self-hosted-linux-amd64-noble-large]
environment:
  CONCIERGE: '$(HOST: echo "${CONCIERGE:-concierge.yaml}")'
  OPCLI_GIT_REF: '$(HOST: echo "${OPCLI_GIT_REF:-main}")'
exclude:
- .git
- .tox
- .venv
- .*_cache
integration-suites:
  falco-operator/tests/integration/:
    summary: falco machine charm integration tests
    working-dir: falco-operator/
    backends:
    - integration-test
    environment:
      CONCIERGE: concierge.yaml
    pytest-arguments-template: |
      {% set charm = artifacts.charms | selectattr("name", "equalto", "falco") | first %}
      {% for build in charm.builds | selectattr("arch", "equalto", arch) %}
      --charm-file={{ build.path | replace('./', '../', 1) }}
      {% endfor %}
  falcosidekick-k8s-operator/tests/integration/:
    summary: falcosidekick k8s charm integration tests
    working-dir: falcosidekick-k8s-operator/
    backends:
    - integration-test
    environment:
      CONCIERGE: concierge-k8s.yaml
    pytest-arguments-template: |
      {% set charm = artifacts.charms | selectattr("name", "equalto", "falcosidekick-k8s") | first %}
      {% for build in charm.builds | selectattr("arch", "equalto", arch) %}
      --charm-file={{ build.path | replace('./', '../', 1) }}
      {% endfor %}
      {% set rock = artifacts.rocks | selectattr("name", "equalto", "falcosidekick") | first %}
      {% for build in rock.builds | selectattr("arch", "equalto", arch) %}
      --falcosidekick-image={{ build.image or build.file }}
      {% endfor %}
